@if (open) {
  <div class="fixed inset-0 z-[100] flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-navy-950/60 backdrop-blur-sm" (click)="closeModal()" role="presentation"></div>
    <div class="relative w-full max-w-3xl card-navy p-6">
      <div class="flex items-start justify-between gap-4 mb-4">
        <div>
          <h3 class="text-lg font-bold text-white">{{ title }}</h3>
          @if (description) {
            <p class="text-sm text-slate-500 mt-1">{{ description }}</p>
          }
        </div>
        <button
          type="button"
          (click)="closeModal()"
          class="p-2 text-slate-400 hover:text-white hover:bg-navy-800 rounded-lg transition-colors"
          aria-label="Fermer"
        >
          X
        </button>
      </div>
      <div class="space-y-4">
        <ng-content select="[modalBody]"></ng-content>
      </div>
      <div class="mt-6">
        <ng-content select="[modalFooter]"></ng-content>
      </div>
    </div>
  </div>
}
