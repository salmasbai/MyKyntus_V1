@if (role$ | async; as role) {
  <app-admin-shell
    title="Configuration du workflow"
    description="Workflow fixe (pas de configuration par Admin)"
    iconName="git-branch"
  >
    <div class="card-navy p-6 space-y-2">
      <p class="text-slate-200">
        Seul le rôle <span class="font-bold">RH</span> peut approuver ou rejeter une demande de document.
      </p>
      <p class="text-slate-400 text-sm">
        Les rôles <span class="font-semibold">Coach</span>, <span class="font-semibold">Manager</span> et
        <span class="font-semibold">RP</span>
        ne peuvent pas utiliser les actions <span class="font-semibold">Approve</span> /
        <span class="font-semibold">Reject</span>.
      </p>
      @if (isAdmin(role)) {
        <p class="text-amber-400 text-sm">
          La configuration du flux n’est pas nécessaire côté <span class="font-semibold">Admin</span>.
        </p>
      }
    </div>
  </app-admin-shell>
}
